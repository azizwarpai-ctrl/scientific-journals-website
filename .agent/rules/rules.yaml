rules:
  - id: auth-no-public-gateway-auth
    description: "digitopub MUST NOT authenticate public users or issue SSO tokens from untrusted client payload."
    strict: true
    enforcement:
      - "No public endpoints can generate HMAC SSO tokens based on an email in the POST body."
      - "SSO tokens are exclusively issued synchronously by the backend provisioning process."
  
  - id: auth-ojs-sole-identity
    description: "SubmitManager (OJS) is the solitary source of truth for public identity and sessions."
    strict: true
    enforcement:
      - "digitopub must never call getSession() for public routes."
      - "Public UI components must link directly to OJS for protected actions."
      - "No local login pages or modals exist for public users."

  - id: redirect-authority
    description: "SSO and cross-domain links must always provide explicit, exact redirect paths including the target journal context."
    strict: true
    enforcement:
      - "Must not rely on existing OJS session context to decide where to route users."
      - "Must always pass `journalPath` in redirect queries."
      - "Redirect format to submission must strictly be `/index.php/{journalPath}/submission`."

  - id: admin-redirect-isolation
    description: "Admin OTP verification must redirect to /admin, never to OJS endpoints."
    strict: true
    enforcement:
      - "verify-code-form.tsx must redirect to /admin after successful OTP verification."
      - "The /admin route must be guarded by admin JWT checks (validateAdminJwt or equivalent) and return 401/403 for missing/invalid admin tokens."
      - "The /admin route must be excluded from any public-route allowlists (e.g., PublicRouteAllowlist, isPublicRoute configs) and must not reference registration store state (selectedJournalPath) or OJS SSO endpoints."
      - "Admin authentication flow must have zero interaction with OJS SSO endpoints."

  - id: sso-fallback-safety
    description: "SSO login fallback must default to OJS dashboard, not submission wizard."
    strict: true
    enforcement:
      - "sso_login.php must default redirect to `/index.php/index/login` when no redirect param is provided."
      - "Missing redirect parameters must be logged as warnings for debugging, but must redact or omit any query string, token, or sensitive parameter values."
      - "Fallback must never land on a submission path to prevent cross-journal leakage."

  - id: no-dead-public-routes
    description: "Every entry in PUBLIC_ROUTES must have a corresponding page component."
    strict: true
    enforcement:
      - "Each path in PUBLIC_ROUTES must map to an app/ directory page.tsx file."
      - "Dead routes must be removed to prevent confusion."

  - id: type-safety-no-any
    description: "Prisma query results and API responses must not use `as any` casts."
    strict: false
    enforcement:
      - "Use Prisma-generated types or explicit interfaces for all database query results."
      - "Use Zod-inferred types for all API response parsing."

  - id: monetization-isolation
    description: "Payment and subscription logic must be isolated from auth and submission flows."
    strict: true
    enforcement:
      - "Payment endpoints must use a separate feature module under src/features/billing/."
      - "Subscription status must not gate OJS submission flow."
      - "Payment state must not leak into SSO tokens or OJS provisioning."
